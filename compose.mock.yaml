services:
  mockserver:
    image: mockserver/mockserver:latest
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/coindesk-expectations.json
    volumes:
      - ./mockserver/coindesk-expectations.json:/config/coindesk-expectations.json:ro
    expose:
      - "1080"
    ports:
      - "1080:1080"
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: Password123456*
      MSSQL_PID: Evaluation
    ports:
      - "1433:1433"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          /opt/mssql-tools18/bin/sqlcmd
          -S localhost
          -U sa
          -P "$$MSSQL_SA_PASSWORD"
          -C
          -Q "SELECT 1"
          -b
          -o /dev/null
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  api:
    image: bitcoin-market-loader-api
    build:
      context: .
      dockerfile: BitcoinMarketLoader.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      useInMemoryRepositories: ${USE_IN_MEMORY_REPOSITORIES:-false}
      Database__ApplyMigrations: ${APPLY_DATABASE_MIGRATIONS:-true}
      MarketTickPolling__IntervalSeconds: ${MARKET_TICK_POLLING_INTERVAL_SECONDS:-15}
      CoinDeskClient__BaseUrl: http://mockserver:1080
      CoinDeskClient__ApiKey: ""
      CoinDeskClient__OverrideTickId: "true"
      ConnectionStrings__SqlServer: "Data Source=sqlserver;Initial Catalog=master;User ID=sa;Password=Password123456*;Pooling=False;Connect Timeout=30;Encrypt=True;Trust Server Certificate=True;Authentication=SqlPassword;Application Name=vscode-mssql;Application Intent=ReadWrite;Command Timeout=30;"
    ports:
      - "5131:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      mockserver:
        condition: service_healthy
      sqlserver:
        condition: service_healthy

  web:
    image: bitcoin-market-loader-web
    build:
      context: .
      dockerfile: BitcoinMarketLoader.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      BitcoinMarketApi__BaseUrl: http://api:8080
    ports:
      - "5158:8080"
    depends_on:
      api:
        condition: service_healthy
