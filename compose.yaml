services:
  api:
    image: bitcoin-market-loader-api
    build:
      context: .
      dockerfile: BitcoinMarketLoader.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      useInMemoryRepositories: ${USE_IN_MEMORY_REPOSITORIES:-true}
      Database__ApplyMigrations: ${APPLY_DATABASE_MIGRATIONS:-false}
      MarketTickPolling__IntervalSeconds: ${MARKET_TICK_POLLING_INTERVAL_SECONDS:-0}
      CoinDeskClient__ApiKey: ${COINDESK_API_KEY:-}
    ports:
      - "5131:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  web:
    image: bitcoin-market-loader-web
    build:
      context: .
      dockerfile: BitcoinMarketLoader.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      BitcoinMarketApi__BaseUrl: http://api:8080
    ports:
      - "5158:8080"
    depends_on:
      api:
        condition: service_healthy
